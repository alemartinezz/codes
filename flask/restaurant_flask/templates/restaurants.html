<html>

<head>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body>
    <div class="container">
        <h1>List of Restaurants...</h1>
        <br>

        {% for i in restaurants %}
        <div class="list-group">
            <a href="/restaurant-{{i.id}}/menu" class="list-group-item list-group-item-action">
                <div class="row">
                    <div class="col-8"><h5>{{i.name}}</h5></div>
                    <div class="col-4"> <button type="button" class="btn btn-outline-danger pull-right">See menu</button></div>
                </div>
            </a>
        </div>
        {% endfor %}
        <br>

        <p><a href='/'>← Logout </a></p> 
    </div>
</body>

</html>
