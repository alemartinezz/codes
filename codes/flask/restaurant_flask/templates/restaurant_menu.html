<html>

<head>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>

<body>
    <div class="container">
        <h1>{{restaurant.name}}</h1>
        </br>

        {% for i in items %} 
            <h3>{{i.name}}</h3>

            <p>{{i.description}}</p>

            <p> {{i.price}} </p>

            <p><a href='/restaurant-{{restaurant.id}}/menu-{{i.id}}/edit'>Edit menu</a> - <a href='/restaurant-{{restaurant.id}}/menu-{{i.id}}/delete'>Delete menu</a></p> 
            
            </br>
        {% endfor %}
        
        </br>
        
        <p><a href='/restaurant-{{restaurant.id}}/menu/new'>Create new menu</a></p> 
        <p><a href='/restaurants/'>← All restaurants</a></p> 
    </div>
</body>

</html>
